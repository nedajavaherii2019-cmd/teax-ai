<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teax AI</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:tahoma,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:900px;
}

.logo{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    color:#b0b0b0;
    margin-bottom:80px;
    font-size:18px;
}

.main-text{
    font-size:38px;
    margin-bottom:50px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    background:#1f1f1f;
    border:1px solid #333;
    color:white;
    padding:18px 35px;
    border-radius:18px;
    text-decoration:none;
    font-size:20px;
    transition:0.3s;
}

.btn:hover{
    background:#2f2f2f;
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container">

<div class="logo">Teax AI</div>

<div class="subtitle">
دستیار هوشمند شما
</div>

<div class="main-text">
من اینجام تا به شما جهانی جدید را نشان دهم
</div>

<div class="buttons">
<a href="#" class="btn">🚀 فضا</a>
<a href="#" class="btn">🔮 ماوراءالطبیعه</a>
</div>

</div>

</body>
</html>
