<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teax AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Tahoma,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:1000px;
    text-align:center;
}

.logo{
    position:absolute;
    top:20px;
    right:25px;
}

.logo img{
    width:160px;
    height:160px;
    object-fit:contain;
}

.subtitle{
    color:#b3b3b3;
    margin-top:10px;
    font-size:18px;
}

.main-title{
    font-size:52px;
    margin-bottom:40px;
}

.message-box{
    width:100%;
    background:#222;
    border:1px solid #444;
    border-radius:25px;
    padding:25px;
    font-size:22px;
    color:#ddd;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn{
    background:#1d1d1d;
    color:white;
    text-decoration:none;
    border:1px solid #444;
    padding:18px 30px;
    border-radius:20px;
    transition:.3s;
    font-size:20px;
}

.btn:hover{
    background:#333;
}
</style>

</head>

<body>

<div class="logo">
    <img src="logo.png" alt="Teax AI Logo">
</div>

<div class="container">

    <div class="main-title">
        من اینجام تا به شما جهانی جدید را نشان دهم
    </div>

    <div class="message-box">
        به دنیای Teax AI خوش آمدید
    </div>

    <div class="buttons">
        <a class="btn" href="#">🚀 فضا</a>
        <a class="btn" href="#">🔮 ماوراءالطبیعه</a>
    </div>

</div>

</body>
</html>
